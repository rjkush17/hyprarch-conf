[config]
# ...

[templates.kitty]
input_path = '~/.config/matugen/templates/kitty.conf'
output_path = '~/.config/kitty/colors.conf'
post_hook = 'pkill -SIGUSR1 kitty'

[templates.waybar]
input_path = '~/.config/matugen/templates/colors.css'
output_path = '~/.config/waybar/colors.css'
post_hook = 'pkill waybar && waybar &'

[templates.hyprland]
input_path = '~/.config/matugen/templates/hyprland.conf'
output_path = '~/.config/hypr/colors.conf'
post_hook = 'hyprctl reload'

[templates.rofi]
input_path = '~/.config/matugen/templates/colors.rasi'
output_path = '~/.config/rofi/colors.rasi'

[templates.nvim]
input_path = "~/.config/matugen/templates/color.lua"
output_path = "~/.config/nvim/lua/colors/matugen.lua"
post_hook = "pkill -SIGUSR1 nvim"

[templates.gtk3]
input_path = '~/.config/matugen/templates/gtk-colors.css'
output_path ='~/.config/gtk-3.0/colors.css'

[templates.gtk4]
input_path = '~/.config/matugen/templates/gtk-colors.css'
output_path ='~/.config/gtk-4.0/colors.css'

[templates.ghostty]
input_path  = "~/.config/matugen/templates/ghostty"
output_path = "~/.config/ghostty/themes/matugen"
post_hook   = "ghostty +reload-config 2>/dev/null || true"

[templates.wlogout]
input_path  = "~/.config/matugen/templates/colors.css"
output_path = "~/.config/wlogout/colors.css"
post_hook   = "ghostty +reload-config 2>/dev/null || true"

[templates.pywalfox]
input_path = '~/.config/matugen/templates/pywalfox-colors.json'
output_path = '~/.cache/wal/colors.json'
post_hook = 'pywalfox update'

[templates.dunst]
input_path = '~/.config/matugen/templates/dunstrc'
output_path = '~/.config/dunst/dunstrc'
post_hook = "pkill dunst; sleep 0.2; dunst & sleep 0.3; notify-send -i \"$HOME/.config/Script/icons/color.png\" \"🎨 Dunst Theme Updated\" \"Applied Pywal colors successfully\""

[templates.folder]
input_path = '~/.config/matugen/templates/folder-color.txt'
output_path = '~/.config/matugen/papirus-folders/folder-color.txt'

[templates.qt6]
input_path = '~/.config/matugen/templates/matugen.colors'
output_path = '~/.local/share/color-schemes/matugen.colors'

# allow_remote_control yes
