# ==========================================================
# Matugen Terminal Color Scheme (Balanced / Accessible)
# Material You semantic mapping
# ==========================================================

# =====================
# Core
# =====================
foreground               #e1e2e8
background               #111418

# Cursor
cursor                   #a3c9fe
cursor_text_color         #00315b

# Selection (high contrast, readable)
selection_foreground      #d3e4ff
selection_background      #1e4875

# URLs
url_color                 #a3c9fe

# =====================
# ANSI Colors (Normal)
# =====================

# Black — UI dividers / shadows
color0                    #8d9199

# Red — errors / danger
color1                    #ffb4ab

# Green — success / ok
color2                    #a3c9fe

# Yellow — warnings / hints
color3                    #bbc7db

# Blue — info / links
color4                    #1e4875

# Magenta — accents
color5                    #d8bde3

# Cyan — secondary info
color6                    #3c4758

# White — normal text
color7                    #c3c6cf

# =====================
# ANSI Colors (Bright)
# =====================

# Bright Black
color8                    #43474e

# Bright Red
color9                    #93000a

# Bright Green
color10                   #d3e4ff

# Bright Yellow
color11                   #3c4758

# Bright Blue
color12                   #533f5e

# Bright Magenta
color13                   #a3c9fe

# Bright Cyan
color14                   #d7e3f8

# Bright White
color15                   #e1e2e8

# =====================
# Extended UI (optional, supported terminals)
# =====================
active_border_color       #a3c9fe
inactive_border_color     #43474e
bell_border_color         #ffb4ab
