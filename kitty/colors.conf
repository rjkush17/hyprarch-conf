# ==========================================================
# Matugen Terminal Color Scheme (Balanced / Accessible)
# Material You semantic mapping
# ==========================================================

# =====================
# Core
# =====================
foreground               #e3e2e9
background               #121318

# Cursor
cursor                   #b2c5ff
cursor_text_color         #182e60

# Selection (high contrast, readable)
selection_foreground      #dae2ff
selection_background      #314578

# URLs
url_color                 #b2c5ff

# =====================
# ANSI Colors (Normal)
# =====================

# Black — UI dividers / shadows
color0                    #8f909a

# Red — errors / danger
color1                    #ffb4ab

# Green — success / ok
color2                    #b2c5ff

# Yellow — warnings / hints
color3                    #c0c6dd

# Blue — info / links
color4                    #314578

# Magenta — accents
color5                    #e1bbdc

# Cyan — secondary info
color6                    #414659

# White — normal text
color7                    #c5c6d0

# =====================
# ANSI Colors (Bright)
# =====================

# Bright Black
color8                    #45464f

# Bright Red
color9                    #93000a

# Bright Green
color10                   #dae2ff

# Bright Yellow
color11                   #414659

# Bright Blue
color12                   #5a3d59

# Bright Magenta
color13                   #b2c5ff

# Bright Cyan
color14                   #dde2f9

# Bright White
color15                   #e3e2e9

# =====================
# Extended UI (optional, supported terminals)
# =====================
active_border_color       #b2c5ff
inactive_border_color     #45464f
bell_border_color         #ffb4ab
