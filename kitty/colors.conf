# ==========================================================
# Matugen Terminal Color Scheme (Balanced / Accessible)
# Material You semantic mapping
# ==========================================================

# =====================
# Core
# =====================
foreground               #e1e2e9
background               #111318

# Cursor
cursor                   #a6c8ff
cursor_text_color         #02315f

# Selection (high contrast, readable)
selection_foreground      #d5e3ff
selection_background      #234776

# URLs
url_color                 #a6c8ff

# =====================
# ANSI Colors (Normal)
# =====================

# Black — UI dividers / shadows
color0                    #8d9199

# Red — errors / danger
color1                    #ffb4ab

# Green — success / ok
color2                    #a6c8ff

# Yellow — warnings / hints
color3                    #bdc7dc

# Blue — info / links
color4                    #234776

# Magenta — accents
color5                    #dabde2

# Cyan — secondary info
color6                    #3d4758

# White — normal text
color7                    #c4c6cf

# =====================
# ANSI Colors (Bright)
# =====================

# Bright Black
color8                    #43474e

# Bright Red
color9                    #93000a

# Bright Green
color10                   #d5e3ff

# Bright Yellow
color11                   #3d4758

# Bright Blue
color12                   #553f5d

# Bright Magenta
color13                   #a6c8ff

# Bright Cyan
color14                   #d9e3f8

# Bright White
color15                   #e1e2e9

# =====================
# Extended UI (optional, supported terminals)
# =====================
active_border_color       #a6c8ff
inactive_border_color     #43474e
bell_border_color         #ffb4ab
