add_newline = true

format = """
 ╭─ $os$username$hostname$directory$git_branch$fill$jobs$cmd_duration$rust$nodejs$shell 
 ╰─$character
"""

# ==================== OS ====================
[os]
format = "[$symbol ]($style)"
style = "bold blue"          # primary accent
disabled = false

[os.symbols]
Arch = ""

# ==================== USER / HOST ====================
[username]
format = "[$user]($style)"
style_user = "bold green"    # identity / success
show_always = true

[hostname]
format = "[|>$hostname ]($style)"
style = "dimmed green"       # secondary identity
ssh_only = false

# ==================== DIRECTORY ====================
[directory]
format = "[  $path ]($style)"
style = "bold blue"          # navigation focus
truncation_length = 4
truncation_symbol = "…/"
truncate_to_repo = false

# ==================== GIT ====================
[git_branch]
symbol = " "
format = "[$symbol$branch]($style) "
style = "bold cyan"

# ==================== FILL ====================
[fill]
symbol = " "

# ==================== CMD DURATION ====================
[cmd_duration]
format = "[ $duration ]($style)"
style = "dimmed white"       # secondary info
min_time = 1000

# ==================== LANG RUNTIMES ====================
[rust]
format = "[ $version ]($style)"
style = "bold red"           # strong, recognizable

[nodejs]
format = "[󰎙 $version ]($style)"
style = "bold green"         # healthy runtime

[bun]
symbol = "🥟 "
format = "[$symbol]($style)"
style = "bold yellow"

[lua]
symbol = "🌙 "
format = "[$symbol]($style)"
style = "bold blue"

# ==================== JOBS ====================
[jobs]
symbol = "󰆍 "
format = "[$symbol$number]($style) "
style = "bold magenta"       # accent, noticeable

# ==================== SHELL ====================
[shell]
disabled = false
format = "[$indicator ]($style)"
style = "dimmed white"       # neutral system info

bash_indicator = " Bash"
zsh_indicator  = " Zsh"
fish_indicator = "󰈺 Fish"
nu_indicator   = "󰄛 Nu"
powershell_indicator = "󰨊 PS"
unknown_indicator = "?"

# ==================== PROMPT SYMBOL ====================
[character]
success_symbol = "[](bold green)"
error_symbol   = "[✘](bold red)"
