$hypr = ~/.config/hypr
# Variables (colours + other vars)
exec = cp -L --no-preserve=mode --update=none $hypr/scheme/default.conf $hypr/scheme/current.conf
source = $hypr/scheme/current.conf

$activeWindowBorderColour = rgba($primarye6)
$inactiveWindowBorderColour = rgba($onSurfaceVariant11)

# Variable for the set app for the hyprland files
$terminal = kitty
$fileManager = dolphin
$browser = zen-browser
$notes = obsidian
$sticky = xpad

#  # Font settings
env = GDK_FONT,JetBrains Mono
env = QT_FONT,JetBrains Mono
env = GDK_DPI_SCALE,1
# ############# Themes #############
env = QT_QPA_PLATFORMTHEME, qtengine
env = QT_WAYLAND_DISABLE_WINDOWDECORATION, 1
env = QT_AUTO_SCREEN_SCALE_FACTOR, 1
env = XCURSOR_THEME, Bibata-Modern-Ice
env = XCURSOR_SIZE, 24

#env = QT_STYLE_OVERRIDE,kvantum
env = QT_ICON_THEME,Tela-dark

# ######## Toolkit backends ########
env = GDK_BACKEND, wayland,x11
env = QT_QPA_PLATFORM, wayland;xcb
env = SDL_VIDEODRIVER, wayland,x11,windows
env = CLUTTER_BACKEND, wayland
env = ELECTRON_OZONE_PLATFORM_HINT, auto

# ####### XDG specifications #######
env = XDG_CURRENT_DESKTOP, Hyprland
env = XDG_SESSION_TYPE, wayland
env = XDG_SESSION_DESKTOP, Hyprland

# ############# Others #############
env = _JAVA_AWT_WM_NONREPARENTING, 1
