#----------------------------------------------------
# Variables
#----------------------------------------------------

$mainMod  = SUPER
$wsaction = fish ~/.config/Script/wsaction.fish


#----------------------------------------------------
# Caelestia Shell
#----------------------------------------------------

# Launcher
bindl = $mainMod, Space, global, caelestia:launcher
bindin = $mainMod, any,        global, caelestia:launcherInterrupt
bindin = $mainMod, mouse:272,  global, caelestia:launcherInterrupt
bindin = $mainMod, mouse:273,  global, caelestia:launcherInterrupt
bindin = $mainMod, mouse:274,  global, caelestia:launcherInterrupt
bindin = $mainMod, mouse:275,  global, caelestia:launcherInterrupt
bindin = $mainMod, mouse:276,  global, caelestia:launcherInterrupt
bindin = $mainMod, mouse:277,  global, caelestia:launcherInterrupt
bindin = $mainMod, mouse_up,   global, caelestia:launcherInterrupt
bindin = $mainMod, mouse_down, global, caelestia:launcherInterrupt

# Panels & UI
bind  = $mainMod , F4, global, caelestia:session
bind  = $mainMod,    N,       global, caelestia:sidebar
bind  = $mainMod Shift,    M,       global, caelestia:showall
bind  = $mainMod,    M,       global, caelestia:lock
bindl = Ctrl+Alt, C,       global, caelestia:clearNotifs

# Clipboard & Emoji
bind  = $mainMod,          V,      exec, pkill fuzzel || caelestia clipboard
bind  = $mainMod+Alt,      V,      exec, pkill fuzzel || caelestia clipboard -d
bind  = $mainMod,          Period, exec, pkill fuzzel || caelestia emoji -p
bindl = Ctrl+Shift+Alt, V,      exec, sleep 0.5s && ydotool type -d 1 "$(cliphist list | head -1 | cliphist decode)"  # Alt

# Screenshot & Recording
bindl = ,               Print, exec,   caelestia screenshot                # Full screen capture > clipboard
bind  = $mainMod+Shift,    S,     exec, quickshell -c HyprQuickFrame          # Capture region (freeze)
bind  = $mainMod+Shift+Alt, S,    global, caelestia:screenshot                # Capture region
bind  = $mainMod+Alt,      R,     exec,   caelestia record -s                 # Record screen with sound
bind  = Ctrl+Alt,       R,     exec,   caelestia record                    # Record screen
bind  = $mainMod+Shift+Alt, R,    exec,   caelestia record -r                 # Record region

# Brightness (via Caelestia)
bind = $mainMod, F2, global, caelestia:brightnessDown
bind = $mainMod, F3, global, caelestia:brightnessUp

# Test Notification
bindl = $mainMod+Alt, F12, exec, notify-send -u low -i dialog-information-symbolic 'Test notification' "Here's a really long message to test truncation and wrapping\nYou can middle click or flick this notification to dismiss it!" -a 'Shell' -A "Test1=I got it!" -A "Test2=Another action"


#----------------------------------------------------
# Applications
#----------------------------------------------------

bind = $mainMod,       B,      exec, app2unit -- $browser
bind = $mainMod,       F,      exec, app2unit -- $fileManager
bind = $mainMod,       Q,      exec, app2unit -- $terminal
bind = $mainMod,       X,      exec, app2unit -- $sticky
bind = $mainMod,       A,      exec, app2unit -- $notes
bind = $mainMod SHIFT, Q,      exec, app2unit -- $terminal --class floating_kitty

# Wallpaper
# bind = $mainMod,       W,      exec, ~/.config/Script/wallpaper_changer.sh
# bind = $mainMod ALT,   W,      exec, waypaper --folder ~/Wallpapers/.hyprland.backup/
#bind = $mainMod SHIFT, W,     exec, waypaper --folder ~/Wallpapers/hyprland/

# Scripts & Utilities
bind = $mainMod SHIFT, Return, exec, ~/.config/Script/toggle-hypr-layout
bind = $mainMod SHIFT, C,      exec, hyprpicker -a                        # Colour picker


#----------------------------------------------------
# Window Management
#----------------------------------------------------

# System
bind = $mainMod,       ESCAPE, killactive,
bind = $mainMod,       DELETE, exit,
bind = $mainMod,       return, togglefloating,
bind = $mainMod SHIFT, p,      pseudo
bind = $mainMod,       Z,      layoutmsg, swapwithmaster
#bind = $mainMod,      t,      togglesplit, # no longer valid

# Move Focus (Tiling)
bind = $mainMod CTRL, h, movefocus, l   # left
bind = $mainMod CTRL, l, movefocus, r   # right
bind = $mainMod CTRL, k, movefocus, u   # up
bind = $mainMod CTRL, j, movefocus, d   # down

# Move Focus (Scrolling layout)
bind = $mainMod, l, layoutmsg, move +col
bind = $mainMod, h, layoutmsg, move -col
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# Move Window (Tiling)
bind = $mainMod SHIFT, h, exec, hyprctl dispatch swapwindow l
bind = $mainMod SHIFT, l, exec, hyprctl dispatch swapwindow r
bind = $mainMod SHIFT, k, exec, hyprctl dispatch swapwindow u
bind = $mainMod SHIFT, j, exec, hyprctl dispatch swapwindow d

# Move Window (Scrolling layout)
bind = $mainMod SHIFT, l, layoutmsg, movewindowto r
bind = $mainMod SHIFT, h, layoutmsg, movewindowto l
bind = $mainMod SHIFT, k, layoutmsg, movewindowto u
bind = $mainMod SHIFT, j, layoutmsg, movewindowto d

# Resize Window
bind = $mainMod ALT, h, resizeactive, -20 0   # shrink width
bind = $mainMod ALT, l, resizeactive,  20 0   # expand width
bind = $mainMod ALT, k, resizeactive, 0 -20   # shrink height
bind = $mainMod ALT, j, resizeactive, 0  20   # expand height

# Swap Column (Scrolling layout)
bind = $mainMod, bracketleft,  layoutmsg, swapcol l
bind = $mainMod, bracketright, layoutmsg, swapcol r

# Fit / View Control
bind = $mainMod,       grave, layoutmsg, colresize +conf
bind = $mainMod,       p,     layoutmsg, promote
bind = $mainMod SHIFT, grave, layoutmsg, togglefit

# Mouse Drag
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow


#----------------------------------------------------
# Workspaces
#----------------------------------------------------

# Switch to Slot (same group)
bind = $mainMod, 1, exec, $wsaction workspace 1
bind = $mainMod, 2, exec, $wsaction workspace 2
bind = $mainMod, 3, exec, $wsaction workspace 3
bind = $mainMod, 4, exec, $wsaction workspace 4
bind = $mainMod, 5, exec, $wsaction workspace 5
bind = $mainMod, 6, exec, $wsaction workspace 6
bind = $mainMod, 7, exec, $wsaction workspace 7
bind = $mainMod, 8, exec, $wsaction workspace 8
bind = $mainMod, 9, exec, $wsaction workspace 9
bind = $mainMod, 0, exec, $wsaction workspace 10

# Switch Group (same slot)
bind = Ctrl+$mainMod, 1, exec, $wsaction -g workspace 1
bind = Ctrl+$mainMod, 2, exec, $wsaction -g workspace 2
bind = Ctrl+$mainMod, 3, exec, $wsaction -g workspace 3
bind = Ctrl+$mainMod, 4, exec, $wsaction -g workspace 4
bind = Ctrl+$mainMod, 5, exec, $wsaction -g workspace 5
bind = Ctrl+$mainMod, 6, exec, $wsaction -g workspace 6
bind = Ctrl+$mainMod, 7, exec, $wsaction -g workspace 7
bind = Ctrl+$mainMod, 8, exec, $wsaction -g workspace 8
bind = Ctrl+$mainMod, 9, exec, $wsaction -g workspace 9
bind = Ctrl+$mainMod, 0, exec, $wsaction -g workspace 10

# Move Window to Workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scroll Through Workspaces
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up,   workspace, e-1

#----------------------------------------------------
# Media & Volume
#----------------------------------------------------

# Volume (Hardware Keys)
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute,        exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioMicMute,     exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# Volume (Function Keys)
bindel = $mainMod, F8, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = $mainMod, F7, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = $mainMod, F6, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = $mainMod, F5, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# Brightness (Hardware Keys)
bindel = , XF86MonBrightnessUp,   global, caelestia:brightnessUp
bindel = , XF86MonBrightnessDown, global, caelestia:brightnessDown

# Media Playback (Caelestia)
bindl = Ctrl+$mainMod, Space,    global, caelestia:mediaToggle
bindl = , XF86AudioPlay,      global, caelestia:mediaToggle
bindl = , XF86AudioPause,     global, caelestia:mediaToggle
bindl = Ctrl+$mainMod, Equal,    global, caelestia:mediaNext
bindl = , XF86AudioNext,      global, caelestia:mediaNext
bindl = Ctrl+$mainMod, Minus,    global, caelestia:mediaPrev
bindl = , XF86AudioPrev,      global, caelestia:mediaPrev
bindl = , XF86AudioStop,      global, caelestia:mediaStop

# Media Playback (Playerctl)
bindl = $mainMod, XF86AudioPlay,  exec, playerctl play-pause
bindl = $mainMod, XF86AudioPause, exec, playerctl play-pause
bindl = $mainMod, XF86AudioNext,  exec, playerctl next
bindl = $mainMod, XF86AudioPrev,  exec, playerctl previous


#----------------------------------------------------
# Plugins (Commented Out)
#----------------------------------------------------

# Toggle overview on current monitor
# bind = $mainMod,       E, exec, hyprctl dispatch overview:toggle
# bind = $mainMod SHIFT, E, hyprexpo:expo, toggle
