animations {
    # Master switch
    enabled = yes, please :)        # enable all animations

    ############################
    # Animation curves (how it moves)
    ############################

    bezier = easeOutQuint,0.23,1,0.32,1        # fast start → smooth stop
    bezier = easeInOutCubic,0.65,0.05,0.36,1  # smooth in & out
    bezier = linear,0,0,1,1                   # constant speed (no easing)
    bezier = almostLinear,0.5,0.5,0.75,1.0    # near-linear, slightly smooth
    bezier = quick,0.15,0,0.1,1               # very fast snap
    bezier = smooth,0.3,0.7,0.4,1             # soft smooth motion
    bezier = ultraSmooth,0.25,1,0.5,1         # extra smooth
    bezier = bouncy,0.34,1.56,0.64,1          # overshoot / bounce effect

    bezier = specialWorkSwitch,0.05,0.7,0.1,1 # smooth workspace switch curve

    bezier = emphasizedAccel,0.3,0,0.8,0.15   # fast exit (material accel)
    bezier = emphasizedDecel,0.05,0.7,0.1,1   # slow smooth entry (material decel)
    bezier = standard,0.2,0,0,1               # default balanced curve

    bezier = md3_decel,0.05,0.7,0.1,1          # material design decelerate
    bezier = md3_accel,0.3,0,0.8,0.15          # material design accelerate

    bezier = myBezier,0.25,1,0.5,1.05          # custom window open feel
    bezier = myBezier2,0.25,0.75,0.5,1.05      # custom workspace/window motion

    ############################
    # Panels / layer-shell (waybar, rofi, notifications)
    ############################

    animation = layersIn, 1, 5, emphasizedDecel, slide
    # panel_open_animation

    animation = layersOut, 1, 4, emphasizedAccel, slide
    # panel_close_animation

    animation = fadeLayers, 1, 5, standard
    # panel_fade_animation

    ############################
    # Window animations (apps)
    ############################

    animation = windowsIn, 1, 5, myBezier, popin 10%
    # window_open_animation

    animation = windowsOut, 1, 3, myBezier2, popin 25%
    # window_close_animation

    animation = windowsMove, 1, 6, standard
    # window_move_animation (drag / tile rearrange)

    ############################
    # Workspace animations
    ############################

    animation = workspaces, 1, 5, myBezier2, slidevert
    # normal_workspace_switch_animation (vertical slide)

    animation = specialWorkspace, 1, 4, bouncy, slidefadevert 15%
    # scratchpad_workspace_animation

    ############################
    # Visual polish
    ############################

    animation = fade, 1, 6, standard
    # window_opacity_change_animation

    animation = fadeDim, 1, 6, standard
    # inactive_window_dim_animation

    animation = border, 1, 6, standard
    # window_focus_border_animation

    ############################
    # plugined based animations
    ############################

    # animation = hyprfocusIn, 1, 1.7, md3_accel
    # window_focus_enter_animation

    # animation = hyprfocusOut, 1, 1.7, md3_accel
    # window_focus_exit_animation
}
