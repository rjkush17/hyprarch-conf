#----------------------------------------------------
# Some Default app and its keys
#----------------------------------------------------

# Set Super/Meta keys for the mainMod
$mainMod = SUPER
# here is the all application keybinds
bind = $mainMod, B, exec, $browser
bind = $mainMod, F, exec, $fileManager
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, X, exec, xpad
bind = $mainMod, space, exec, $menu
bind = $mainMod SHIFT, W, exec, waypaper --folder ~/Wallpapers/hyprland/
bind = $mainMod ALT, W, exec, waypaper --folder ~/Wallpapers/.hyprland.backup/
bind = $mainMod, M, exec, hyprlock
bind = $mainMod SHIFT, Q, exec, kitty --class floating_kitty
bind = $mainMod, F4, exec, wlogout -b 6

bind = $mainMod, PRINT, exec, hyprshot -m window -o ~/Screenshot
bind = $mainMod SHIFT, S, exec, hyprshot -m region -o ~/Screenshot
bind = $mainMod, W, exec,  ~/.config/Script/wallpaper_changer.sh
bind = $mainMod SHIFT, Return, exec, ~/.config/Script/toggle-hypr-layout
bind = $mainMod, V, exec,~/.config/Script/clipboard.sh
# bind = $mainMod, A, exec, ~/.local/share/applications/Affine.desktop
bind = $mainMod, A, exec, obsidian
# Here is the some window System Commands
bind = $mainMod, ESCAPE, killactive,
bind = $mainMod, DELETE, exit,
bind = $mainMod, return, togglefloating,
bind = $mainMod SHIFT, p, pseudo
bind = $mainMod, Z, layoutmsg, swapwithmaster
#bind = $mainMod, t, togglesplit, #hyprland remove it its not longer valid

#----------------------------------------------------
# Plugins keys
#----------------------------------------------------
# Toggle overview on current monitor
# bind = $mainMod, E, exec, hyprctl dispatch overview:toggle
# Toggle overview on current monitor
# bind = $mainMod SHIFT, E, hyprexpo:expo, toggle

#----------------------------------------------------
# Window and its Related Keys
#----------------------------------------------------

# moves window (Tiling)
bind = $mainMod SHIFT, h, exec, hyprctl dispatch swapwindow l
bind = $mainMod SHIFT, l, exec, hyprctl dispatch swapwindow r
bind = $mainMod SHIFT , k, exec, hyprctl dispatch swapwindow u
bind = $mainMod SHIFT, j, exec, hyprctl dispatch swapwindow d

# move window ( scrolling)
bind = $mainMod SHIFT, l, layoutmsg, movewindowto r
bind = $mainMod SHIFT, h, layoutmsg, movewindowto l
bind = $mainMod SHIFT, k, layoutmsg, movewindowto u
bind = $mainMod SHIFT, j, layoutmsg, movewindowto d

# Move focus (Tiling) — Mod + Ctrl + hjkl
bind = $mainMod CTRL, h, movefocus, l   # h → left
bind = $mainMod CTRL, l, movefocus, r   # l → right
bind = $mainMod CTRL, k, movefocus, u   # k → up
bind = $mainMod CTRL, j, movefocus, d   # j → down

# move focus (scrolling)
bind = $mainMod, l, layoutmsg, move +col
bind = $mainMod, h, layoutmsg, move -col
bind = $mainMod, k, movefocus, u   # k → up
bind = $mainMod, j, movefocus, d   # j → down


# Resize window (scrolling + tiling)
bind = $mainMod ALT, h, resizeactive, -20 0   # shrink width (left)
bind = $mainMod ALT, l, resizeactive, 20 0    # expand width (right)
bind = $mainMod ALT, k, resizeactive, 0 -20   # shrink height (up)
bind = $mainMod ALT, j, resizeactive, 0 20    # expand height (down)

# swap the entire colume ( scrolling )
bind = $mainMod, bracketleft, layoutmsg, swapcol l
bind = $mainMod, bracketright, layoutmsg, swapcol r

# Fit operations (camera / view control)
bind = $mainMod, grave, layoutmsg, colresize +conf
bind = $mainMod, p, layoutmsg, promote
bind = $mainMod SHIFT, grave, layoutmsg, togglefit

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, TAB, togglespecialworkspace, magic
bind = $mainMod SHIFT, TAB, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

#----------------------------------------------------
# Media Keybinds
#----------------------------------------------------

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-

# Computer multimedia keys for volume and LCD brightness
bind = $mainMod, F2, exec, brightnessctl set 10%-
bind = $mainMod, F3, exec, brightnessctl set +10%

bindel = $mainMod,F8, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = $mainMod,F7, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = $mainMod,F6, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = $mainMod,F5, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# Requires playerctl
bindl = $mainMod, XF86AudioNext, exec, playerctl next
bindl = $mainMod, XF86AudioPause, exec, playerctl play-pause
bindl = $mainMod, XF86AudioPlay, exec, playerctl play-pause
bindl = $mainMod, XF86AudioPrev, exec, playerctl previous  
