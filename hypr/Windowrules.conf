    name = oklch-color-picker
    match:title = Oklch Color Picker
    float = true
    size = 500 400
}

# Waybar blue config
# layerrule = blur,waybar 
# layerrule = blurpopups,waybar
# layerrule = ignorealpha 0.2,waybar

layerrule {
    name = waybar-blur
    match:namespace = waybar
    blur = true
    blur_popups = true
    ignore_alpha = 0.2
    no_anim = true
}

windowrule {
  name = waypaper
  match:class = waypaper
  float = true
  size = 1050 704
  center = true
}
