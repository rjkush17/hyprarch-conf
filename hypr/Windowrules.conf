# windowrulev2 = float, class:^(blueman-manager)$
# # windowrulev2 = opacity 0.8 overide, class:^(blueberry.py)$
# windowrulev2 = size 700 500, class:^(blueman-manager)$

windowrule {
    name = blueman-manager
    match:class = blueman-manager

    float = true
    size = 700 500
}

# windowrulev2 = float, class:^(xpad)$
# windowrulev2 = size 400 300, class:^(xpad)$
# windowrulev2 = opacity 1 override,class:^(xpad)$
#
windowrule {
    name = xpad
    match:class = xpad
    float = true
    size = 400 300
    opacity = 1 override
}

